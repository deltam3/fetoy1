<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f0faf4"/>

  <!-- Accent blob top-left -->
  <circle cx="0" cy="0" r="320" fill="#00b96b" opacity="0.08"/>

  <!-- Accent blob bottom-right -->
  <circle cx="1200" cy="630" r="260" fill="#00b96b" opacity="0.06"/>

  <!-- Logo badge -->
  <rect x="80" y="72" width="64" height="64" rx="16" fill="#00b96b"/>
  <text x="112" y="116" font-family="Arial, sans-serif" font-size="40" font-weight="700" text-anchor="middle" fill="#ffffff">F</text>

  <!-- Brand name -->
  <text x="160" y="119" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#008f51" letter-spacing="3">FOODSNAP</text>

  <!-- Divider -->
  <rect x="80" y="192" width="80" height="5" rx="3" fill="#00b96b"/>

  <!-- Headline -->
  <text x="80" y="290" font-family="Arial, sans-serif" font-size="72" font-weight="700" fill="#111827" letter-spacing="-2">Snap your meal.</text>
  <text x="80" y="378" font-family="Arial, sans-serif" font-size="72" font-weight="700" fill="#111827" letter-spacing="-2">Know what's in it.</text>

  <!-- Subline -->
  <text x="80" y="456" font-family="Arial, sans-serif" font-size="32" fill="#6b7280">AI-powered nutrition, recipes, and insights — instantly.</text>

  <!-- CTA pill -->
  <rect x="80" y="510" width="280" height="60" rx="30" fill="#00b96b"/>
  <text x="220" y="549" font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#ffffff">Join the waitlist</text>
</svg>
